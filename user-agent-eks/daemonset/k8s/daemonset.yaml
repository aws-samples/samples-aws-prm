# PRM attribution DaemonSet.
#
# Kubernetes runs exactly one of these pods on each node that matches the
# scheduling rules. Each pod touches its own node's EC2 instance ARN at startup
# and once per calendar month (see touch-loop.sh).
#
# CORRECTNESS / SCOPING:
#   A DaemonSet runs on every node it is allowed to schedule on. In a multi-tenant
#   cluster with INTERMIXED compute this over-attributes — you would touch nodes
#   you do not actually use and take even-split share from the partners who do.
#   This pattern is therefore correct ONLY for PARTITIONED compute: restrict it to
#   a node pool dedicated to this partner with the nodeSelector below.
#
#   The placeholder label __NODE_SELECTOR_KEY__: __NODE_SELECTOR_VALUE__ is
#   substituted by deploy.sh. By default it targets a dedicated pool label; pass
#   --all-nodes to deploy.sh to remove the selector (NOT recommended for
#   intermixed multi-tenant clusters).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: prm-daemonset
  namespace: prm-daemonset
  labels:
    app: prm-daemonset
spec:
  selector:
    matchLabels:
      app: prm-daemonset
  template:
    metadata:
      labels:
        app: prm-daemonset
    spec:
      serviceAccountName: prm-daemonset-sa
      # Restrict to this partner's dedicated nodes. Rendered by deploy.sh.
      nodeSelector:
        __NODE_SELECTOR_KEY__: "__NODE_SELECTOR_VALUE__"
      # Tolerate common taints so the attribution pod can run on dedicated/tainted
      # pools. Adjust to match your node pool's taints.
      tolerations:
        - operator: Exists
      containers:
        - name: prm-daemonset
          image: __DAEMONSET_IMAGE__
          env:
            - name: AWS_SDK_UA_APP_ID
              value: "__APP_ID__"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: AWS_REGION
              value: "__REGION__"
            # TESTING ONLY: when > 0, touch every N seconds instead of once per
            # calendar month so you can observe activity quickly. PRM only requires
            # one touch per node ARN per calendar month — leave at 0 for production.
            - name: TEST_INTERVAL_SECONDS
              value: "__TEST_INTERVAL_SECONDS__"
          resources:
            requests:
              cpu: "10m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"
