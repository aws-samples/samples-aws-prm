AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Self-contained stack for the PRM User-Agent sidecar pattern. Deploys an EKS
  cluster in Auto Mode plus a dedicated IAM role and EKS Pod Identity association
  for the sidecar workload (its own namespace and service account), so the sidecar
  attributes EC2 node compute to a partner product code via the SDK User-Agent.

Parameters:
  ClusterName:
    Type: String
    Default: prm-sidecar
    Description: Name of the EKS cluster

  KubernetesVersion:
    Type: String
    Default: '1.36'
    Description: Kubernetes control plane version

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >-
      Subnets where EKS Auto Mode deploys nodes (provide at least two in
      different Availability Zones; you may use your default VPC subnets)

  SidecarNamespace:
    Type: String
    Default: prm-sidecar
    Description: Kubernetes namespace for the sidecar workload

  SidecarServiceAccount:
    Type: String
    Default: prm-sidecar-sa
    Description: Kubernetes service account the sidecar runs as

  RepositoryName:
    Type: String
    Default: prm-sidecar
    Description: Name of the ECR repository for the sidecar image

Resources:
  # ========================================
  # ECR repository for the sidecar image
  # ========================================
  # EmptyOnDelete lets `delete-stack` remove the repository even if it still
  # contains pushed images, so the repo shares the stack's lifecycle.
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref RepositoryName
      EmptyOnDelete: true
      ImageScanningConfiguration:
        ScanOnPush: true

  # ========================================
  # Cluster IAM Role
  # ========================================
  ClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ClusterName}-cluster-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        - arn:aws:iam::aws:policy/AmazonEKSComputePolicy
        - arn:aws:iam::aws:policy/AmazonEKSBlockStoragePolicy
        - arn:aws:iam::aws:policy/AmazonEKSLoadBalancingPolicy
        - arn:aws:iam::aws:policy/AmazonEKSNetworkingPolicy

  # ========================================
  # Node IAM Role
  # ========================================
  NodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ClusterName}-node-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodeMinimalPolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPullOnly

  # ========================================
  # EKS Auto Mode Cluster
  # ========================================
  Cluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt ClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds: !Ref SubnetIds
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
      AccessConfig:
        AuthenticationMode: API
      ComputeConfig:
        Enabled: true
        NodeRoleArn: !GetAtt NodeRole.Arn
        NodePools:
          - general-purpose
          - system
      KubernetesNetworkConfig:
        ElasticLoadBalancing:
          Enabled: true
      StorageConfig:
        BlockStorage:
          Enabled: true

  # ========================================
  # Sidecar workload IAM role + Pod Identity (dedicated to this pattern)
  # ========================================
  # Read-only EC2 describe permissions used to "touch" the node's instance ARN
  # with the partner product code in the User-Agent.
  SidecarRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ClusterName}-sidecar-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEksAuthToAssumeRoleForPodIdentity
            Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: describe-instance-attribute
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DescribeInstanceAttribute
                Effect: Allow
                Action:
                  - ec2:DescribeInstanceAttribute
                  - ec2:DescribeInstances
                Resource: '*'

  # Binds the sidecar's own service account to its own IAM role.
  SidecarPodIdentity:
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Ref Cluster
      Namespace: !Ref SidecarNamespace
      ServiceAccount: !Ref SidecarServiceAccount
      RoleArn: !GetAtt SidecarRole.Arn

Outputs:
  ClusterName:
    Description: Name of the EKS Auto Mode cluster
    Value: !Ref Cluster

  ClusterArn:
    Description: ARN of the EKS cluster
    Value: !GetAtt Cluster.Arn

  UpdateKubeconfigCommand:
    Description: Command to configure kubectl for this cluster
    Value: !Sub 'aws eks update-kubeconfig --name ${Cluster} --region ${AWS::Region}'

  SidecarRoleArn:
    Description: ARN of the sidecar IAM role
    Value: !GetAtt SidecarRole.Arn

  SidecarPodIdentityArn:
    Description: ARN of the sidecar EKS Pod Identity association
    Value: !GetAtt SidecarPodIdentity.AssociationArn

  EcrRepositoryUri:
    Description: URI of the ECR repository for the sidecar image
    Value: !GetAtt EcrRepository.RepositoryUri
