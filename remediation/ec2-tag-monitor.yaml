# AWS Resource Tag Monitoring and Auto-Remediation Template

AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Monitor and automatically restore critical AWS resource tags if modified or removed.
  
  This template detects tag changes on monitored resources and automatically restores 
  original values using Amazon EventBridge and AWS Lambda.
  
  IMPORTANT: Review RISK_ASSESSMENT.md before deployment.
  
  Key Security Considerations:
  - AWS Identity and Access Management (IAM) permissions use wildcards (Resource: '*') - restrict to specific ARNs in production
  - Automatic remediation may override legitimate changes - implement authorization whitelist
  - AWS CloudTrail logs contain sensitive data - enable Amazon S3 versioning and AWS KMS encryption
  - AWS Lambda functions need Amazon Virtual Private Cloud (Amazon VPC) isolation for enhanced security
  
  Key Operational Considerations:
  - AWS CloudTrail has 5-15 minute delay - remediation is not real-time
  - May interfere with incident response - implement emergency override mechanism
  - Configure Dead Letter Queue for AWS Lambda error handling
  - Integrate with AWS Systems Manager Change Calendar for maintenance windows
  
  Estimated Monthly Cost: $1-13 (AWS CloudTrail storage + AWS Lambda invocations)
  
  Critical Actions Before Deployment:
  1. Enable Amazon S3 versioning and Object Lock for audit compliance
  2. Replace wildcard IAM permissions with specific resource ARNs
  3. Implement emergency override mechanism (Amazon DynamoDB exemptions table)
  4. Configure AWS Key Management Service (AWS KMS) encryption for AWS CloudTrail
  5. Set up Amazon CloudWatch alarms and Amazon SNS notifications
  
  See RISK_ASSESSMENT.md for complete details. 

Parameters:
  OriginalTagKey:
    Type: String
    Default: aws-apn-id
    Description: The tag key to monitor and restore

  OriginalTagValue:
    Type: String
    Default: pc:137a4305-1a46-436b-bc3b-d40cf4a27637
    Description: The tag value to restore

  ResourceArns:
    Type: CommaDelimitedList
    Description: Comma-delimited list of resource ARNs to monitor for tag changes
    Default: "arn:aws:ec2:us-east-1:123456789012:instance/i-1234567890abcdef0"

Resources:
  # ========================================
  # Lambda Function for Tag Remediation
  # ========================================
  
  # IAM role for Lambda function
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ResourceTaggingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - tag:TagResources
                  - tag:UntagResources
                  - tag:GetResources
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: '*'

  # Lambda function to restore resource tags
  TagRemediationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-tag-remediation'
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TAG_KEY: !Ref OriginalTagKey
          TAG_VALUE: !Ref OriginalTagValue
          MONITORED_ARNS: !Join [",", !Ref ResourceArns]
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          
          def lambda_handler(event, context):
              # Get original tag from environment variables
              original_tag_key = os.environ['TAG_KEY']
              original_tag_value = os.environ['TAG_VALUE']
              monitored_arns = os.environ['MONITORED_ARNS'].split(',')
              
              # Extract resource ARNs from EventBridge event (top level)
              resource_arns = event.get('resources', [])
              
              if not resource_arns:
                  print("No resource ARNs found in event")
                  return
              
              # Process each resource ARN
              for resource_arn in resource_arns:
                  # Check if this resource is in our monitored list
                  if resource_arn not in monitored_arns:
                      print(f"Resource {resource_arn} not in monitored list, ignoring")
                      continue
                  
                  try:
                      # Use Resource Groups Tagging API for universal tagging
                      tagging_client = boto3.client('resourcegroupstaggingapi')
                      
                      # Re-apply the original tag
                      tagging_client.tag_resources(
                          ResourceARNList=[resource_arn],
                          Tags={
                              original_tag_key: original_tag_value
                          }
                      )
                      
                      print(f"Successfully restored tag {original_tag_key}={original_tag_value} on resource {resource_arn}")
                      
                  except Exception as e:
                      print(f"Error restoring tags on resource {resource_arn}: {str(e)}")
                      # Continue processing other resources instead of raising

  # ========================================
  # EventBridge Rule for Tag Changes
  # ========================================
  
  # EventBridge rule to monitor AWS resource tag changes
  ResourceTagChangeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-resource-tag-changes'
      Description: Monitor AWS resource tag changes
      EventPattern:
        source:
          - aws.tag
        detail-type:
          - Tag Change on Resource
        detail:
          changed-tag-keys:
            - !Ref OriginalTagKey
        resources: !Ref ResourceArns
      State: ENABLED
      Targets:
        - Arn: !GetAtt TagRemediationFunction.Arn
          Id: TagRemediationTarget

  # Permission for EventBridge to invoke Lambda
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TagRemediationFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ResourceTagChangeRule.Arn

  # ========================================
  # CloudTrail for API Logging (Required for EventBridge)
  # ========================================
  
  # S3 bucket for CloudTrail logs
  CloudTrailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-cloudtrail-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # S3 bucket policy for CloudTrail
  CloudTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${CloudTrailBucket}'
              - !Sub 'arn:aws:s3:::${CloudTrailBucket}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${CloudTrailBucket}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': bucket-owner-full-control
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !Sub 'arn:aws:s3:::${CloudTrailBucket}'

  # CloudTrail for capturing resource tagging API calls
  CloudTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: CloudTrailBucketPolicy
    Properties:
      TrailName: !Sub '${AWS::StackName}-resource-api-trail'
      S3BucketName: !Ref CloudTrailBucket
      IncludeGlobalServiceEvents: true
      IsMultiRegionTrail: true
      EnableLogFileValidation: true
      IsLogging: true
      EventSelectors:
        - ReadWriteType: All
          IncludeManagementEvents: true
          DataResources: []

Outputs:
  LambdaFunctionArn:
    Description: ARN of the tag remediation Lambda function
    Value: !GetAtt TagRemediationFunction.Arn

  EventBridgeRuleArn:
    Description: ARN of the EventBridge rule
    Value: !GetAtt ResourceTagChangeRule.Arn

  CloudTrailArn:
    Description: ARN of the CloudTrail
    Value: !GetAtt CloudTrail.Arn